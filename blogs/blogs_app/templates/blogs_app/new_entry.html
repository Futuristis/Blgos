
{% extends 'blogs_app/base.html' %}

{% block content %}

<p><a href="{% url 'blogs_app:topic' topic.id %}">{{topic}}</a></p>
<p>Add a new entry:</p>
<form action="{% url 'blogs_app:new_entry' topic.id %}" method = 'post'>
    {% csrf_token %}
    {{form.as_div}}
    <button name="submit">Add entry</button>
</form>

{% endblock content %}
