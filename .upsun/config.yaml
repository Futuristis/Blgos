applications:
  blogs_app:
    source:
      root: "blogs"
    type: "python:3.11"

    # THIS IS WHAT WAS MISSING: Tells Upsun how to actually run your Django server
    web:
      commands:
        start: "gunicorn blogs.wsgi:application --bind 0.0.0.0:$PORT --workers 3"

    mounts:
      "logs":
        source: local
        source_path: logs

    hooks:
      build: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements_remote.txt
        # FIX: Removed the 'mkdir logs' and 'rm -rf logs' because the mount handles this folder
        python manage.py collectstatic --noinput
      deploy: |
        python manage.py migrate

    relationships:
      database: "db:postgresql"

services:
  db:
    type: postgresql:15 # Upgraded from 12 to 15 (Upsun requires modern versions)

routes:
  "https://{default}/":
    type: upstream
    upstream: "blogs_app:http"
  "https://www.{default}/":
    type: redirect
    to: "https://{default}/"